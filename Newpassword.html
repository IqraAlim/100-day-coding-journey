<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="create-account" style="height: 380px;">
            <h1>Change Password</h1>
            <form>
                <input type="password" id="new-password" name="new-password" required placeholder="New Password">
                <br>
                <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm Password">
                <br>
                <button type="submit">Reset Password</button>
            </form>
        </div>
    </div>
</body>
</html>
